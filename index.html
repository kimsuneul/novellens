<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>노벨렌즈 — 웹소설 AI 창작 도구</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://js.tosspayments.com/v1/payment"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;--bg2:#16161d;--bg3:#1e1e28;--bg4:#252533;
  --border:#2e2e3e;--border2:#3a3a4e;
  --accent:#7c6af7;--accent2:#9d8fff;
  --text:#e8e6f0;--text2:#9896b0;--text3:#5e5c78;
  --red:#f07070;--green:#6fcf8e;--yellow:#f9d100;
  --radius:10px;--radius-sm:6px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif}
#app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
#sidebar{width:200px;min-width:200px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
#logo{padding:16px 16px 12px;border-bottom:1px solid var(--border)}
#logo h1{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:600;color:var(--text);letter-spacing:-0.3px}
#logo p{font-size:10px;color:var(--text3);margin-top:3px;letter-spacing:0.5px;text-transform:uppercase}
#plan-badge{margin-top:8px;display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;background:var(--bg4);color:var(--text3)}
#plan-badge.premium{background:rgba(249,209,0,0.15);color:var(--yellow)}
#project-list{flex:1;overflow-y:auto;padding:8px 6px}
#project-list::-webkit-scrollbar{width:3px}
#project-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.pitem{padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:2px;border:1px solid transparent;transition:all 0.15s}
.pitem:hover{background:var(--bg3)}
.pitem.active{background:var(--bg3);border-color:var(--border2)}
.pitem .pname{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pitem .pmeta{font-size:10px;color:var(--text3);margin-top:2px}
#new-proj{margin:8px 6px;padding:9px;border-radius:var(--radius-sm);border:1px dashed var(--border2);background:transparent;cursor:pointer;font-size:12px;color:var(--text3);font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;gap:6px;transition:all 0.15s;width:calc(100% - 12px)}
#new-proj:hover{color:var(--text2);border-color:var(--accent)}
#subscribe-btn{margin:6px;padding:10px;border-radius:var(--radius-sm);border:none;background:var(--yellow);color:#1a1a00;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.15s;width:calc(100% - 12px)}
#subscribe-btn:hover{background:#ffe033}
#subscribe-btn.premium{background:rgba(249,209,0,0.1);color:var(--yellow);border:1px solid rgba(249,209,0,0.3)}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{padding:11px 18px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
#proj-title{font-size:14px;font-weight:500;color:var(--text);flex:1}
#apikey-status{font-size:10px;padding:3px 8px;border-radius:20px;background:var(--bg4);color:var(--text3)}
#apikey-status.ok{background:rgba(111,207,142,0.15);color:var(--green)}
#apikey-btn{padding:5px 11px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.15s}
#apikey-btn:hover{border-color:var(--accent);color:var(--accent2)}

#right-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
#write-section{flex:1;display:flex;flex-direction:column;overflow:hidden;border-bottom:2px solid var(--border2);min-height:0}
#chapter-bar{padding:8px 14px 0;background:var(--bg2);display:flex;gap:5px;align-items:flex-end;flex-wrap:wrap;flex-shrink:0}
.ctab{padding:6px 14px;border-radius:var(--radius-sm) var(--radius-sm) 0 0;font-size:12px;cursor:pointer;border:1px solid transparent;border-bottom:none;color:var(--text3);background:transparent;transition:all 0.15s;font-family:'Noto Sans KR',sans-serif}
.ctab:hover{color:var(--text2);background:var(--bg3)}
.ctab.active{color:var(--text);background:var(--bg);border-color:var(--border);border-bottom:1px solid var(--bg)}
#add-chapter{padding:5px 10px;border-radius:var(--radius-sm);border:1px dashed var(--border2);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-bottom:4px;transition:all 0.15s}
#add-chapter:hover{color:var(--accent2);border-color:var(--accent)}
#editor-wrap{flex:1;padding:14px 18px;background:var(--bg);display:flex;flex-direction:column;gap:10px;min-height:0}
#editor{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;font-size:14px;font-family:'Noto Serif KR',serif;line-height:2;color:var(--text);resize:none;outline:none;min-height:0;transition:border 0.15s}
#editor:focus{border-color:var(--border2)}
#editor-footer{display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#charcount{font-size:11px;color:var(--text3)}
#analyze-btn{padding:8px 20px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:white;font-size:13px;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.15s;display:flex;align-items:center;gap:8px}
#analyze-btn:hover{background:var(--accent2)}
#analyze-btn:disabled{background:var(--bg4);color:var(--text3);cursor:default}
.spinner{width:13px;height:13px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

#analysis-section{height:42%;min-height:0;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
#analysis-header{padding:0;background:var(--bg2);display:flex;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0}
.atab{padding:10px 14px;font-size:12px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all 0.15s;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;border-top:none;border-left:none;border-right:none;background:transparent}
.atab:hover{color:var(--text2)}
.atab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.cumul-tag{font-size:10px;padding:2px 7px;border-radius:20px;background:rgba(124,106,247,0.15);color:var(--accent2);margin-left:auto;margin-right:12px}
#analysis-body{flex:1;overflow-y:auto;padding:14px 18px}
#analysis-body::-webkit-scrollbar{width:3px}
#analysis-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.empty{text-align:center;padding:24px 16px;color:var(--text3);font-size:12px;line-height:1.8}
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.char-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px}
.char-name{font-size:13px;font-weight:700;color:var(--accent2);margin-bottom:3px}
.char-desc{font-size:12px;color:var(--text2);line-height:1.5}
.char-rel{font-size:11px;color:var(--text3);margin-top:4px;padding-top:4px;border-top:1px solid var(--border)}
.ch-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px}
.ch-badge{display:inline-block;padding:2px 8px;border-radius:20px;background:rgba(124,106,247,0.2);color:var(--accent2);font-size:10px;font-weight:700;margin-bottom:5px}
.ch-text{font-size:12px;color:var(--text2);line-height:1.6}
.setting-group{margin-bottom:12px}
.setting-label{font-size:10px;color:var(--text3);margin-bottom:5px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase}
.setting-val{font-size:12px;color:var(--text2);line-height:1.6;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px}
.tag-list{display:flex;flex-wrap:wrap;gap:5px}
.tag{padding:3px 9px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);font-size:11px;color:var(--text2)}
.spell-card{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:var(--radius-sm);padding:8px 12px;cursor:pointer;transition:all 0.15s}
.spell-card:hover{border-left-color:var(--accent)}
.spell-wrong{font-size:12px;color:var(--red);text-decoration:line-through}
.spell-correct{font-size:12px;color:var(--green);font-weight:500}
.spell-reason{font-size:11px;color:var(--text3);margin-top:2px}
.no-error{text-align:center;padding:16px;color:var(--green);font-size:12px}

/* 무료 제한 배너 */
#free-limit-banner{display:none;background:rgba(249,209,0,0.08);border:1px solid rgba(249,209,0,0.2);border-radius:var(--radius-sm);padding:10px 14px;margin:10px 18px;font-size:12px;color:var(--yellow);text-align:center}

/* MODAL */
#modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999;align-items:center;justify-content:center}
#modal-bg.show{display:flex}
#modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:24px;width:380px;max-width:90vw}
#modal h3{font-size:15px;font-weight:600;margin-bottom:8px}
#modal p{font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.6}
#modal input{width:100%;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;margin-bottom:14px}
#modal input:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.btn-cancel{padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.btn-ok{padding:7px 16px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:white;font-size:12px;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.btn-ok:hover{background:var(--accent2)}

/* 요금제 모달 */
#plan-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center}
#plan-modal-bg.show{display:flex}
#plan-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:28px;width:440px;max-width:90vw}
#plan-modal h2{font-size:18px;font-weight:700;margin-bottom:6px;color:var(--text)}
#plan-modal .subtitle{font-size:12px;color:var(--text3);margin-bottom:20px}
.plan-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.plan-card{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:16px;cursor:pointer;transition:all 0.2s}
.plan-card:hover{border-color:var(--accent)}
.plan-card.selected{border-color:var(--accent);background:rgba(124,106,247,0.08)}
.plan-card .plan-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
.plan-card .plan-price{font-size:20px;font-weight:700;color:var(--accent2);margin-bottom:8px}
.plan-card .plan-price span{font-size:11px;color:var(--text3);font-weight:400}
.plan-card .plan-features{font-size:11px;color:var(--text2);line-height:1.8}
.plan-card.recommended{border-color:var(--yellow);background:rgba(249,209,0,0.05)}
.plan-card.recommended .plan-name::after{content:' ⭐';font-size:11px}
.email-input-wrap{margin-bottom:14px}
.email-input-wrap label{font-size:12px;color:var(--text2);margin-bottom:6px;display:block}
.email-input-wrap input{width:100%;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none}
.email-input-wrap input:focus{border-color:var(--accent)}
#pay-btn{width:100%;padding:12px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:white;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.15s}
#pay-btn:hover{background:var(--accent2)}
#plan-close{float:right;background:transparent;border:none;color:var(--text3);font-size:18px;cursor:pointer;margin-top:-4px}
</style>
</head>
<body>
<div id="app">

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="logo">
    <h1>노벨렌즈</h1>
    <p>웹소설 AI 창작 도구</p>
    <div id="plan-badge">무료 플랜</div>
  </div>
  <div id="project-list"></div>
  <button id="subscribe-btn">⭐ 프리미엄 구독하기</button>
  <button id="new-proj">＋ 새 작품 추가</button>
</div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <span id="proj-title">작품을 선택하세요</span>
    <span id="apikey-status">API 키 없음</span>
    <button id="apikey-btn">🔑 API 키 설정</button>
  </div>

  <div id="right-panel">
    <div id="write-section">
      <div id="chapter-bar">
        <button id="add-chapter">＋ 회차 추가</button>
      </div>
      <div id="editor-wrap">
        <div id="free-limit-banner">
          ⚠️ 무료 플랜: 이번 달 AI 분석 <span id="usage-count">0</span>/3회 사용 — <a href="#" id="banner-upgrade" style="color:var(--yellow);text-decoration:underline">프리미엄으로 업그레이드</a>
        </div>
        <textarea id="editor" placeholder="왼쪽에서 작품을 선택하거나 새로 만들어 글을 시작하세요." disabled></textarea>
        <div id="editor-footer">
          <span id="charcount">0자</span>
          <button id="analyze-btn" disabled>
            <div class="spinner" id="spinner"></div>
            <span id="btn-text">✦ AI 분석</span>
          </button>
        </div>
      </div>
    </div>

    <div id="analysis-section">
      <div id="analysis-header">
        <button class="atab active" data-tab="characters">👤 인물</button>
        <button class="atab" data-tab="summary">📖 줄거리</button>
        <button class="atab" data-tab="settings">🗺 설정</button>
        <button class="atab" data-tab="spelling">✏️ 맞춤법</button>
        <span class="cumul-tag">누적 분석</span>
      </div>
      <div id="analysis-body">
        <div class="empty">작품을 선택하고 글을 입력한 뒤 AI 분석을 눌러보세요</div>
      </div>
    </div>
  </div>
</div>
</div>

<!-- 기본 MODAL -->
<div id="modal-bg">
  <div id="modal">
    <h3 id="modal-title">새 작품 추가</h3>
    <p id="modal-desc"></p>
    <input id="modal-input" type="text" />
    <div class="modal-btns">
      <button class="btn-cancel" id="modal-cancel">취소</button>
      <button class="btn-ok" id="modal-ok">확인</button>
    </div>
  </div>
</div>

<!-- 요금제 선택 MODAL -->
<div id="plan-modal-bg">
  <div id="plan-modal">
    <button id="plan-close">✕</button>
    <h2>노벨렌즈 프리미엄</h2>
    <p class="subtitle">AI 분석 무제한으로 창작에만 집중하세요</p>

    <div class="plan-cards">
      <div class="plan-card" data-plan="standard" data-amount="4900" data-name="스탠다드 (1개월)">
        <div class="plan-name">스탠다드</div>
        <div class="plan-price">4,900<span>원/월</span></div>
        <div class="plan-features">
          ✓ AI 분석 무제한<br>
          ✓ 작품 10개<br>
          ✓ 누적 분석<br>
          ✓ 인물·줄거리·설정
        </div>
      </div>
      <div class="plan-card recommended" data-plan="pro" data-amount="19900" data-name="프로 (1개월)">
        <div class="plan-name">프로</div>
        <div class="plan-price">19,900<span>원/월</span></div>
        <div class="plan-features">
          ✓ AI 분석 무제한<br>
          ✓ 작품 무제한<br>
          ✓ 누적 분석<br>
          ✓ 우선 지원
        </div>
      </div>
    </div>

    <div class="email-input-wrap">
      <label>이메일 (구독 확인용)</label>
      <input type="email" id="pay-email" placeholder="example@email.com" />
    </div>

    <button id="pay-btn">결제하기</button>
  </div>
</div>

<script>
// ─── 설정 ───────────────────────────────
// 실제 서비스 시 토스페이먼츠 대시보드에서 발급받은 클라이언트 키로 교체
const TOSS_CLIENT_KEY = 'test_ck_여기에_클라이언트키_입력';
const FREE_LIMIT = 3; // 무료 플랜 월 분석 횟수

// ─── 상태 ───────────────────────────────
const S = {
  apiKey: localStorage.getItem('nl_key') || '',
  projects: JSON.parse(localStorage.getItem('nl_projects') || '[]'),
  cur: null, chapter: 0, tab: 'characters',
  // 구독 정보
  isPremium: localStorage.getItem('nl_premium') === 'true',
  premiumExpire: localStorage.getItem('nl_premium_expire') || '',
  userEmail: localStorage.getItem('nl_email') || '',
  // 무료 사용량 (이번달)
  usageKey: 'nl_usage_' + new Date().getFullYear() + '_' + new Date().getMonth(),
};

function getUsage() { return parseInt(localStorage.getItem(S.usageKey) || '0'); }
function addUsage() { localStorage.setItem(S.usageKey, getUsage() + 1); }

function save() { localStorage.setItem('nl_projects', JSON.stringify(S.projects)); }
function proj() { return S.projects.find(p => p.id === S.cur); }

// ─── 구독 상태 확인 ──────────────────────
function checkPremiumStatus() {
  if (!S.isPremium) return false;
  if (S.premiumExpire) {
    const now = new Date();
    const expire = new Date(S.premiumExpire);
    if (now > expire) {
      S.isPremium = false;
      localStorage.removeItem('nl_premium');
      localStorage.removeItem('nl_premium_expire');
      return false;
    }
  }
  return true;
}

function updatePlanUI() {
  const isPrem = checkPremiumStatus();
  const badge = document.getElementById('plan-badge');
  const subBtn = document.getElementById('subscribe-btn');
  const usage = getUsage();

  if (isPrem) {
    badge.textContent = '⭐ 프리미엄';
    badge.className = 'premium';
    subBtn.textContent = '✓ 프리미엄 구독 중';
    subBtn.className = 'premium';
    document.getElementById('free-limit-banner').style.display = 'none';
  } else {
    badge.textContent = '무료 플랜';
    badge.className = '';
    subBtn.textContent = '⭐ 프리미엄 구독하기';
    subBtn.className = '';
    if (usage > 0) {
      document.getElementById('free-limit-banner').style.display = 'block';
      document.getElementById('usage-count').textContent = usage;
    }
  }
}

// ─── 요금제 모달 ─────────────────────────
let selectedPlan = { plan: 'standard', amount: 4900, name: '스탠다드 (1개월)' };

document.getElementById('subscribe-btn').onclick = () => {
  if (checkPremiumStatus()) {
    const expire = new Date(S.premiumExpire);
    alert(`현재 프리미엄 구독 중입니다.\n만료일: ${expire.toLocaleDateString('ko-KR')}`);
    return;
  }
  document.getElementById('plan-modal-bg').classList.add('show');
};

document.getElementById('plan-close').onclick = () => {
  document.getElementById('plan-modal-bg').classList.remove('show');
};

document.querySelectorAll('.plan-card').forEach(card => {
  card.onclick = () => {
    document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selectedPlan = {
      plan: card.dataset.plan,
      amount: parseInt(card.dataset.amount),
      name: card.dataset.name,
    };
  };
});

// 기본 선택
document.querySelector('[data-plan="standard"]').classList.add('selected');

document.getElementById('pay-btn').onclick = async () => {
  const email = document.getElementById('pay-email').value.trim();
  if (!email || !email.includes('@')) {
    alert('올바른 이메일을 입력해주세요.');
    return;
  }

  S.userEmail = email;
  localStorage.setItem('nl_email', email);

  const orderId = 'NL-' + Date.now();
  localStorage.setItem('nl_pending_order', JSON.stringify({
    orderId, amount: selectedPlan.amount, plan: selectedPlan.plan, email
  }));

  try {
    const tossPayments = TossPayments(TOSS_CLIENT_KEY);
    await tossPayments.requestPayment('카드', {
      amount: selectedPlan.amount,
      orderId: orderId,
      orderName: '노벨렌즈 ' + selectedPlan.name,
      customerEmail: email,
      customerName: email,
      successUrl: window.location.href + '?payment=success',
      failUrl: window.location.href + '?payment=fail',
    });
  } catch (error) {
    if (error.code !== 'USER_CANCEL') {
      alert('결제 오류: ' + error.message);
    }
  }
};

// ─── 결제 완료 처리 ──────────────────────
function handlePaymentReturn() {
  const params = new URLSearchParams(window.location.search);
  const payment = params.get('payment');
  const paymentKey = params.get('paymentKey');
  const orderId = params.get('orderId');
  const amount = params.get('amount');

  if (payment === 'success' && paymentKey) {
    // URL 정리
    window.history.replaceState({}, '', window.location.pathname);

    // 구독 정보 저장 (30일)
    const expire = new Date();
    expire.setDate(expire.getDate() + 30);
    S.isPremium = true;
    S.premiumExpire = expire.toISOString();
    localStorage.setItem('nl_premium', 'true');
    localStorage.setItem('nl_premium_expire', expire.toISOString());

    updatePlanUI();
    alert('✅ 결제 완료! 노벨렌즈 프리미엄이 시작되었습니다.\n만료일: ' + expire.toLocaleDateString('ko-KR'));
  } else if (payment === 'fail') {
    window.history.replaceState({}, '', window.location.pathname);
    alert('결제가 취소되었거나 실패했습니다.');
  }
}

// ─── 업그레이드 배너 링크 ────────────────
document.getElementById('banner-upgrade').onclick = (e) => {
  e.preventDefault();
  document.getElementById('plan-modal-bg').classList.add('show');
};

// ─── 기존 기능들 ─────────────────────────
function updateKeyStatus() {
  const el = document.getElementById('apikey-status');
  if (S.apiKey) { el.textContent = '✓ API 키 설정됨'; el.className = 'ok'; }
  else { el.textContent = 'API 키 없음'; el.className = ''; }
}

function renderSidebar() {
  const list = document.getElementById('project-list');
  list.innerHTML = '';
  S.projects.forEach(p => {
    const d = document.createElement('div');
    d.className = 'pitem' + (p.id === S.cur ? ' active' : '');
    const tc = p.chapters.reduce((a, c) => a + (c.text || '').length, 0);
    d.innerHTML = `<div class="pname">${p.name}</div><div class="pmeta">${p.chapters.length}회차 · ${tc.toLocaleString()}자</div>`;
    d.onclick = () => selectProj(p.id);
    list.appendChild(d);
  });
}

function renderChapterBar() {
  const p = proj();
  const bar = document.getElementById('chapter-bar');
  bar.innerHTML = '';
  if (!p) { const b = document.createElement('button'); b.id = 'add-chapter'; b.textContent = '＋ 회차 추가'; b.onclick = addChapter; bar.appendChild(b); return; }
  p.chapters.forEach((ch, i) => {
    const t = document.createElement('button');
    t.className = 'ctab' + (i === S.chapter ? ' active' : '');
    t.textContent = ch.title;
    t.onclick = () => switchChapter(i);
    bar.appendChild(t);
  });
  const add = document.createElement('button');
  add.id = 'add-chapter'; add.textContent = '＋ 회차 추가'; add.onclick = addChapter;
  bar.appendChild(add);
}

function selectProj(id) {
  if (S.cur) { const p = proj(); if (p) p.chapters[S.chapter].text = document.getElementById('editor').value; save(); }
  S.cur = id; S.chapter = 0;
  const p = proj();
  document.getElementById('proj-title').textContent = p.name;
  document.getElementById('editor').disabled = false;
  document.getElementById('analyze-btn').disabled = false;
  renderSidebar(); renderChapterBar(); loadText(); renderAnalysis();
}

function switchChapter(i) {
  const p = proj(); if (!p) return;
  p.chapters[S.chapter].text = document.getElementById('editor').value; save();
  S.chapter = i; renderChapterBar(); loadText();
}

function loadText() {
  const p = proj(); if (!p) return;
  const ch = p.chapters[S.chapter];
  document.getElementById('editor').value = ch ? (ch.text || '') : '';
  updateCharCount();
}

function updateCharCount() {
  const v = document.getElementById('editor').value;
  document.getElementById('charcount').textContent = v.length.toLocaleString() + '자';
}

function addChapter() {
  const p = proj(); if (!p) return;
  p.chapters[S.chapter].text = document.getElementById('editor').value;
  const n = p.chapters.length + 1;
  p.chapters.push({ title: n + '화', text: '', analysis: null });
  S.chapter = p.chapters.length - 1; save();
  renderChapterBar(); loadText(); renderSidebar();
}

function showModal(title, desc, ph, cb) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-desc').textContent = desc;
  document.getElementById('modal-input').value = '';
  document.getElementById('modal-input').placeholder = ph;
  document.getElementById('modal-bg').classList.add('show');
  document.getElementById('modal-ok').onclick = () => {
    const v = document.getElementById('modal-input').value.trim();
    if (v) { document.getElementById('modal-bg').classList.remove('show'); cb(v); }
  };
  document.getElementById('modal-cancel').onclick = () => document.getElementById('modal-bg').classList.remove('show');
  setTimeout(() => document.getElementById('modal-input').focus(), 100);
}

document.getElementById('new-proj').onclick = () => {
  showModal('새 작품 추가', '작품 제목을 입력하세요.', '예: 검은 달의 기사단', name => {
    const id = 'p' + Date.now();
    S.projects.push({ id, name, chapters: [{ title: '1화', text: '', analysis: null }], ca: {} });
    save(); renderSidebar(); selectProj(id);
  });
};

document.getElementById('apikey-btn').onclick = () => {
  showModal('API 키 설정', 'console.anthropic.com에서 발급받은 Claude API 키를 입력하세요.', 'sk-ant-api03-...', key => {
    S.apiKey = key; localStorage.setItem('nl_key', key); updateKeyStatus();
  });
};

document.getElementById('editor').oninput = updateCharCount;

document.querySelectorAll('.atab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.atab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    S.tab = t.dataset.tab;
    renderAnalysis();
  };
});

function renderAnalysis() {
  const p = proj();
  const body = document.getElementById('analysis-body');
  if (!p) { body.innerHTML = '<div class="empty">작품을 선택하세요</div>'; return; }
  const ca = p.ca || {};
  const tab = S.tab;
  if (!ca[tab]) { body.innerHTML = '<div class="empty">아직 분석 결과가 없어요.<br>글을 입력하고 ✦ AI 분석을 눌러보세요.</div>'; return; }
  const d = ca[tab];
  let html = '';

  if (tab === 'characters') {
    const list = d.list || [];
    if (!list.length) { body.innerHTML = '<div class="empty">인물 정보 없음</div>'; return; }
    html = '<div class="results-grid">';
    list.forEach(c => { html += `<div class="char-card"><div class="char-name">${c.name}</div><div class="char-desc">${c.desc}</div>${c.relation ? `<div class="char-rel">관계: ${c.relation}</div>` : ''}</div>`; });
    html += '</div>';
  } else if (tab === 'summary') {
    const chs = d.chapters || [];
    if (!chs.length) { body.innerHTML = '<div class="empty">줄거리 없음</div>'; return; }
    html = '<div class="results-grid">';
    chs.forEach(ch => { html += `<div class="ch-card"><div class="ch-badge">${ch.title}</div><div class="ch-text">${ch.summary}</div></div>`; });
    html += '</div>';
  } else if (tab === 'settings') {
    if (d.world) html += `<div class="setting-group"><div class="setting-label">세계관</div><div class="setting-val">${d.world}</div></div>`;
    if (d.places && d.places.length) html += `<div class="setting-group"><div class="setting-label">등장 장소</div><div class="tag-list">${d.places.map(x => `<span class="tag">${x}</span>`).join('')}</div></div>`;
    if (d.items && d.items.length) html += `<div class="setting-group"><div class="setting-label">주요 설정/아이템</div><div class="tag-list">${d.items.map(x => `<span class="tag">${x}</span>`).join('')}</div></div>`;
    if (!html) html = '<div class="empty">배경/설정 없음</div>';
  } else if (tab === 'spelling') {
    const errs = d.errors || [];
    if (!errs.length) { html = '<div class="no-error">✓ 맞춤법 오류가 없습니다</div>'; }
    else {
      html = '<div class="results-grid">';
      errs.forEach((e, i) => {
        html += `<div class="spell-card" onclick="jumpToText('${e.wrong.replace(/'/g, "\\'")}',${i})">
          <div style="font-size:10px;color:var(--text3);margin-bottom:3px">클릭 → 글에서 위치 이동</div>
          <div class="spell-wrong">${e.wrong}</div>
          <div class="spell-correct">→ ${e.correct}</div>
          ${e.reason ? `<div class="spell-reason">${e.reason}</div>` : ''}
        </div>`;
      });
      html += '</div>';
    }
  }
  body.innerHTML = html || '<div class="empty">결과 없음</div>';
}

// ─── 맞춤법 위치 이동 ────────────────────
function jumpToText(word, idx) {
  const editor = document.getElementById('editor');
  const text = editor.value;
  const pos = text.indexOf(word);
  if (pos !== -1) {
    editor.focus();
    editor.setSelectionRange(pos, pos + word.length);
    const linesBefore = text.substring(0, pos).split('\n').length;
    const lineHeight = parseInt(getComputedStyle(editor).lineHeight) || 28;
    editor.scrollTop = Math.max(0, (linesBefore - 3) * lineHeight);
  }
  document.querySelectorAll('.spell-card').forEach((c, i) => {
    c.style.borderLeftColor = i === idx ? 'var(--accent)' : 'var(--red)';
    c.style.background = i === idx ? 'rgba(124,106,247,0.08)' : 'var(--bg2)';
  });
}

// ─── AI 분석 ─────────────────────────────
document.getElementById('analyze-btn').onclick = async () => {
  const p = proj(); if (!p) return;
  if (!S.apiKey) { alert('API 키를 먼저 설정해주세요.\n우측 상단 "API 키 설정" 버튼을 눌러주세요.'); return; }

  // 무료 플랜 사용량 체크
  if (!checkPremiumStatus()) {
    const usage = getUsage();
    if (usage >= FREE_LIMIT) {
      const ok = confirm(`무료 플랜 월 ${FREE_LIMIT}회 분석 한도를 초과했습니다.\n프리미엄으로 업그레이드하시겠습니까?`);
      if (ok) document.getElementById('plan-modal-bg').classList.add('show');
      return;
    }
  }

  p.chapters[S.chapter].text = document.getElementById('editor').value; save();
  const curChapter = p.chapters[S.chapter];
  if (!curChapter.text.trim()) { alert('글을 먼저 입력해주세요.'); return; }

  const btn = document.getElementById('analyze-btn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btn-text');
  btn.disabled = true; spinner.style.display = 'block'; btnText.textContent = '분석 중...';
  document.getElementById('analysis-body').innerHTML = '<div class="empty"><div style="width:24px;height:24px;border:2px solid rgba(124,106,247,0.3);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px"></div>AI가 분석 중이에요...</div>';

  try {
    const prevCA = p.ca || {};
    const prevResult = Object.keys(prevCA).length > 0 ? JSON.stringify(prevCA) : '없음';

    const prompt = `웹소설 "${p.name}"의 ${curChapter.title} 내용을 분석해줘.

[현재 회차 내용]
${curChapter.text}

[이전까지의 누적 분석 결과]
${prevResult}

위 이전 분석 결과에 현재 회차 내용을 반영하여 전체 내용을 업데이트해줘.
- characters: 이전 인물 목록에 새 인물 추가하고 기존 인물 정보 업데이트
- summary: 이전 줄거리에 현재 회차 줄거리 추가
- settings: 이전 세계관/장소/아이템에 새로운 것 추가
- spelling: 현재 회차의 맞춤법 오류만 검사

반드시 아래 JSON 형식으로만 답해. 다른 텍스트 없이 JSON만:
{"characters":{"list":[{"name":"인물이름","desc":"특징과 역할","relation":"다른 인물과의 관계"}]},"summary":{"chapters":[{"title":"1화","summary":"줄거리 2-3문장"}]},"settings":{"world":"세계관 설명","places":["장소1"],"items":["설정1"]},"spelling":{"errors":[{"wrong":"틀린표현","correct":"올바른표현","reason":"이유"}]}}`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': S.apiKey,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 8000, messages: [{ role: 'user', content: prompt }] })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const raw = data.content[0].text;

    let parsed;
    try {
      const clean = raw.replace(/```json|```/gi, '').trim();
      const jsonMatch = clean.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error('JSON 없음');
      parsed = JSON.parse(jsonMatch[0]);
    } catch (e1) {
      try {
        const clean2 = raw.replace(/```json|```/gi, '').replace(/[\u0000-\u001F\u007F]/g, ' ').trim();
        const jsonMatch2 = clean2.match(/\{[\s\S]*\}/);
        if (!jsonMatch2) throw new Error('JSON 없음2');
        parsed = JSON.parse(jsonMatch2[0]);
      } catch (e2) {
        const start = raw.indexOf('{');
        const end = raw.lastIndexOf('}');
        if (start === -1 || end === -1) throw new Error('AI 응답에서 JSON을 찾을 수 없습니다.');
        parsed = JSON.parse(raw.slice(start, end + 1).replace(/[\u0000-\u001F\u007F]/g, ' '));
      }
    }

    p.ca = { characters: parsed.characters, summary: parsed.summary, settings: parsed.settings, spelling: parsed.spelling };
    save(); renderAnalysis(); renderSidebar();

    // 무료 플랜 사용량 증가
    if (!checkPremiumStatus()) {
      addUsage();
      updatePlanUI();
    }

  } catch (e) {
    document.getElementById('analysis-body').innerHTML = `<div class="empty" style="color:var(--red)">오류: ${e.message}<br><small>API 키를 확인해주세요.</small></div>`;
  }
  btn.disabled = false; spinner.style.display = 'none'; btnText.textContent = '✦ AI 분석';
};

document.getElementById('modal-input').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('modal-ok').click(); });

// ─── 초기화 ──────────────────────────────
handlePaymentReturn();
updateKeyStatus();
updatePlanUI();
renderSidebar();
</script>
